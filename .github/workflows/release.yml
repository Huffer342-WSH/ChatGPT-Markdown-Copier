name: Release on Tag

on:
  push:
    tags:
      - '*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  release:
    name: Build and Publish Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Package extension
        run: pnpm zip

      - name: Decide release type by tag name
        id: classify
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nocasematch

          TAG_NAME="${GITHUB_REF_NAME}"

          if [[ "${TAG_NAME}" =~ -((alpha|beta|rc|pre|preview)([.-][0-9A-Za-z]+)*)$ ]]; then
            echo "release_type=prerelease" >> "${GITHUB_OUTPUT}"
            echo "prerelease=true" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          echo "release_type=stable" >> "${GITHUB_OUTPUT}"
          echo "prerelease=false" >> "${GITHUB_OUTPUT}"

      - name: Generate release notes
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          EXTRA_ARGS=()
          if [[ "${{ steps.classify.outputs.prerelease }}" == "true" ]]; then
            EXTRA_ARGS+=(--prerelease)
          fi

          npx --yes changelogithub \
            --capitalize \
            --group \
            --contributors \
            --name "${GITHUB_REF_NAME}" \
            --output RELEASE_NOTES.md \
            "${EXTRA_ARGS[@]}"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          prerelease: ${{ steps.classify.outputs.prerelease }}
          body_path: RELEASE_NOTES.md
          files: .output/*.zip
